<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customized Tees — Custom Apparel in Louisville, KY</title>

    <!-- Browser-tab icon -->
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />

    <!-- SEO: short description shown in Google search results -->
    <meta name="description" content="Customized Tees — custom apparel and same-day printing in Louisville, KY. Tees, hoodies, and more, ready in under 15 minutes. Visit us at Jefferson Mall & St Matthews." />

    <!-- Social sharing preview (Facebook, Instagram, WhatsApp, iMessage…) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Customized Tees — Custom Apparel in Louisville, KY" />
    <meta property="og:description" content="Same-day custom printing. Tees, hoodies & more, ready in under 15 minutes. Jefferson Mall & St Matthews." />
    <meta property="og:image" content="https://karimabdelfattah7.github.io/customized-tees/og-image.png" />
    <meta property="og:url" content="https://karimabdelfattah7.github.io/customized-tees/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- "Add to Home Screen" support (install the site like an app) -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Customized Tees" />

    <!--
      Google Fonts:
      - Bebas Neue: bold all-caps font used for headings
      - Oswald: clean readable font used for body text
      - Permanent Marker / Satisfy: handwritten fonts used as a fallback
        for the "Edo SZ" brand font (Edo SZ is not free, so if Edo SZ
        is not installed on your visitor's computer the browser falls
        back to Permanent Marker, which has a similar paint-brush feel).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Satisfy&family=Kaushan+Script&family=Bebas+Neue&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- React renders the whole website inside this empty div -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register the service worker (enables install + offline fallback) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(() => {})
        })
      }
    </script>
  </body>
</html>
